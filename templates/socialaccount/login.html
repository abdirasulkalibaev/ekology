<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Ekology — Google orqali kirish</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #f7faf5; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
  .card { background: #fff; border: 1px solid #d8e8d0; border-radius: 20px; padding: 48px 40px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(30,60,20,0.08); }
  .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; text-decoration: none; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: #1a2e1a; }
  .g-circle { width: 64px; height: 64px; background: #f0f7ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 22px; color: #1a2e1a; margin-bottom: 8px; }
  p { font-size: 14px; color: #6b7c6b; margin-bottom: 28px; line-height: 1.6; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 13px; background: #4a8c3f; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
  .btn:hover { background: #3d7534; transform: translateY(-1px); }
  .btn-back { display: block; font-size: 13px; color: #6b7c6b; text-decoration: none; }
  .btn-back:hover { color: #4a8c3f; }
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
      <path d="M18 4C18 4 6 10 6 22C6 28.627 11.373 34 18 34C24.627 34 30 28.627 30 22C30 10 18 4 18 4Z" fill="#4a8c3f" opacity="0.9"/>
      <path d="M18 34C18 34 18 18 28 12" stroke="#2d5a27" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">Ekology</span>
  </a>
  <div class="g-circle">
    <svg width="28" height="28" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
  </div>
  <h1>Google orqali kirish</h1>
  <p>Siz Google hisobingiz orqali Ekology ga kirishga harakat qilyapsiz. Davom etish uchun quyidagi tugmani bosing.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn">Davom etish →</button>
  </form>
  <a href="{% url 'account_login' %}" class="btn-back">← Orqaga qaytish</a>
</div>
</body>
</html>
